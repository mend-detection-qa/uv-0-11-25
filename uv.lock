# uv lockfile — version 2 schema (uv >= 0.11.25)
# Features exercised:
#   - version = 2 (new schema revision)
#   - environments header (multi-environment lock, uv 0.11.25+)
#   - [package.tool-receipt] sections per package
#   - environment-markers field on conditional packages
version = 2
requires-python = ">=3.11"

# environments header: lists the set of environments this lock
# was computed for. New in uv 0.11.25 lockfile schema v2.
environments = [
    "sys_platform == 'linux'",
    "sys_platform == 'win32'",
]

# resolution-markers: cross-product of markers encountered during
# resolution (retained field from v1).
resolution-markers = [
    "sys_platform == 'linux'",
    "sys_platform == 'win32'",
]

[options]
exclude-newer = "2025-06-01T00:00:00Z"

# ---------------------------------------------------------------------------
# Workspace members (virtual sources)
# ---------------------------------------------------------------------------

[[package]]
name = "app-linux"
version = "0.1.0"
source = { virtual = "packages/app-linux" }

[package.dependencies]
h2 = [
    { name = "h2", marker = "sys_platform == 'linux'" },
]
httpx = [
    { name = "httpx" },
]

[package.tool-receipt]
installer = "uv"
requested-extras = []

[[package]]
name = "app-win"
version = "0.1.0"
source = { virtual = "packages/app-win" }

[package.dependencies]
httpx = [
    { name = "httpx" },
]
pywin32 = [
    { name = "pywin32", marker = "sys_platform == 'win32'" },
]

[package.tool-receipt]
installer = "uv"
requested-extras = []

